<!doctype html>
<html lang="ko">
  <body style="margin: 0; font: 13px/1.5 ui-monospace, monospace">
    <pre id="o" style="padding: 8px; margin: 0">running…</pre>
    <!-- Vite dev server(워커)가 SW 를 통해 여기에 서빙한다 -->
    <iframe
      id="preview"
      style="width: 100%; height: 560px; border: 0; border-top: 1px solid #ddd"
    ></iframe>

    <script type="module">
      const out = document.getElementById('o')
      const worker = new Worker(new URL('./worker.ts', import.meta.url), { type: 'module' })

      // 워커가 매 단계 중간 결과를 보낸다. 하드 블록이면 마지막 postMessage 이후로
      // 멈추므로, 어디까지 왔는지가 곧 어디서 멈췄는지다.
      window.__partial = []
      worker.onmessage = (e) => {
        if (Array.isArray(e.data)) {
          window.__partial = e.data
          out.textContent = e.data.map((r) => `${r.ok ? 'PASS' : 'FAIL'}  ${r.name}`).join('\n')
        }
      }
      worker.onerror = (e) => {
        window.__done = [
          { name: 'WORKER ERROR', ok: false, detail: `${e.message} @ ${e.filename}:${e.lineno}` },
        ]
      }

      // ── SW 브리지 ────────────────────────────────────────────────────────
      // SW 는 dedicated worker 와 직접 대화할 수 없다. 페이지가 중계한다:
      //   iframe fetch → SW → 여기 → 워커(Vite) → 역순 반환
      navigator.serviceWorker.addEventListener('message', (e) => {
        if (e.data?.type !== 'vite-request') return
        worker.postMessage(e.data, [e.ports[0]])
      })

      console.log('[bridge] SW 등록 시도')
      try {
        await navigator.serviceWorker.register(new URL('./sw.js', import.meta.url), { scope: '/' })
        console.log('[bridge] SW 등록 성공')
      } catch (err) {
        console.error('[bridge] SW 등록 실패:', String(err))
        window.__swError = String(err)
      }
      await navigator.serviceWorker.ready
      // 첫 로드에는 컨트롤러가 없을 수 있다 — 잡힐 때까지 기다린다
      if (!navigator.serviceWorker.controller) {
        await new Promise((r) =>
          navigator.serviceWorker.addEventListener('controllerchange', r, { once: true }),
        )
      }
      window.__swReady = true
      console.log('[bridge] SW ready, controller=', !!navigator.serviceWorker.controller)

      // 워커의 Vite 서버가 준비될 때까지 기다렸다가 iframe 을 띄운다
      const serverReady = () =>
        (window.__partial ?? []).some((r) => r.name.includes('createServer') && r.ok)
      for (let i = 0; i < 1200 && !serverReady(); i++) {
        await new Promise((r) => setTimeout(r, 20))
      }
      console.log('[bridge] serverReady=', serverReady(), '→ iframe 로드')
      document.getElementById('preview').src = '/preview/index.html'

      // iframe 이 실제로 뜰 때까지 기다렸다가 결과를 확정한다
      const iframeLoaded = new Promise((r) =>
        document.getElementById('preview').addEventListener('load', r, { once: true }),
      )
      await Promise.race([iframeLoaded, new Promise((r) => setTimeout(r, 60000))])
      console.log('[bridge] iframe load 이벤트 완료')
      window.__done = window.__partial
    </script>
  </body>
</html>

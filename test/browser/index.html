<!doctype html>
<html lang="ko">
  <body style="margin: 0; font: 13px/1.5 ui-monospace, monospace">
    <pre id="env" style="padding: 8px; margin: 0; background: #f6f8fa"></pre>
    <pre id="o" style="padding: 8px; margin: 0">running…</pre>
    <iframe
      id="preview"
      style="width: 100%; height: 560px; border: 0; border-top: 1px solid #ddd"
    ></iframe>

    <script type="module">
      // 라이브러리 API 만으로 프리뷰를 띄운다. 이 파일이 곧 사용 예제다.
      import { createPreview, explainUnsupported } from '../../src/preview.ts'

      const env = document.getElementById('env')
      const out = document.getElementById('o')
      const T0 = performance.now()

      // 지원 안 되는 환경이면 여기서 이유가 나온다 (무한 대기 대신)
      const why = explainUnsupported()
      const envLines = [
        `crossOriginIsolated : ${globalThis.crossOriginIsolated}`,
        `SharedArrayBuffer   : ${typeof SharedArrayBuffer !== 'undefined'}`,
        `hardwareConcurrency : ${navigator.hardwareConcurrency}`,
        `deviceMemory        : ${navigator.deviceMemory ?? '(미지원)'} GB`,
        `UA                  : ${navigator.userAgent}`,
      ]
      env.textContent = envLines.join('\n')
      if (why) {
        out.textContent = '지원되지 않는 환경:\n' + why
        window.__done = [{ name: '환경 미지원', ok: false, detail: why }]
        throw new Error(why)
      }

      const worker = new Worker(new URL('./worker.ts', import.meta.url), { type: 'module' })
      window.__partial = []
      worker.onmessage = (e) => {
        if (!Array.isArray(e.data)) return
        window.__partial = e.data
        out.textContent = e.data.map((r) => `${r.ok ? 'PASS' : 'FAIL'}  ${r.name}`).join('\n')
      }
      worker.onerror = (e) => {
        window.__done = [
          { name: 'WORKER ERROR', ok: false, detail: `${e.message} @ ${e.filename}:${e.lineno}` },
        ]
      }

      const preview = await createPreview({
        worker,
        // ⚠️ `new URL('./sw.js', import.meta.url)` 을 쓰면 안 된다 — Vite 가 정적
        // 에셋으로 보고 **원본을 그대로 복사**해서 import 문이 살아있는 채로 나간다.
        // (SW 는 classic worker 로 등록되므로 import 가 있으면 평가가 실패한다.)
        // 별도 엔트리로 번들해서 리터럴 경로로 참조한다.
        swUrl: '/sw.js',
        iframe: document.getElementById('preview'),
      })
      await preview.load()

      const elapsed = ((performance.now() - T0) / 1000).toFixed(1)
      env.textContent = envLines.join('\n') + `\n렌더까지          : ${elapsed}초`
      window.__done = window.__partial

      // 힙 측정은 결과 확정 **후에** — 이 API 는 다음 GC 까지 기다려서 수십 초가 걸린다
      try {
        if (performance.measureUserAgentSpecificMemory) {
          const m = await performance.measureUserAgentSpecificMemory()
          env.textContent += `\nJS/wasm 힙        : ${(m.bytes / 1048576).toFixed(0)} MB`
        }
      } catch {}
    </script>
  </body>
</html>
